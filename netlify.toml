[build]
  # Build command
  command = "npm run build"
  
  # Directory that contains the built files
  publish = "dist"
  
  # Node version for build environment
  environment = { NODE_VERSION = "20" }

[functions]
  directory = "netlify/functions"

# Redirects for single page application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Prevent caching of the service worker file so updates are detected immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Prevent caching of index.html so the latest app shell is always served
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Allow immutable caching of hashed assets (Vite adds content hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
